<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TruyenFullvn Admin - Quản lý comment</title>
  <style>
    :root {
      --bg: #f5f1ea;
      --card: #fff;
      --surface: #faf6f1;
      --primary: #8a3d2f;
      --primary-dark: #6d2d22;
      --text: #2d2d2d;
      --muted: #777;
      --border: #e7ddd2;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px;
    }

    .panel {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 20px;
      margin-bottom: 18px;
      box-shadow: 0 10px 28px rgba(0,0,0,.06);
    }

    h1 {
      color: var(--primary-dark);
      margin: 0 0 10px;
    }

    .muted {
      color: var(--muted);
    }

    .toolbar {
      display: grid;
      grid-template-columns: 1fr 180px auto auto;
      gap: 10px;
      align-items: center;
    }

    input, button, textarea {
      font: inherit;
    }

    input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 14px;
      background: var(--surface);
      outline: none;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 12px 16px;
      font-weight: 700;
      cursor: pointer;
    }

    .btn {
      background: var(--primary);
      color: #fff;
    }

    .btn-light {
      background: #fff5ee;
      color: var(--primary-dark);
      border: 1px solid #f0d7c5;
    }

    .btn-danger {
      background: #b3261e;
      color: #fff;
    }

    .comment-list {
      display: grid;
      gap: 12px;
    }

    .comment-item {
      border: 1px solid var(--border);
      background: var(--surface);
      border-radius: 16px;
      padding: 14px;
      display: grid;
      gap: 10px;
    }

    .comment-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .comment-book {
      color: var(--primary-dark);
      font-weight: 800;
    }

    .comment-meta {
      color: var(--muted);
      font-size: 14px;
    }

    .comment-content {
      white-space: pre-wrap;
      line-height: 1.6;
    }

    .comment-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }

    .status {
      min-height: 22px;
      color: var(--muted);
    }

    .status.error {
      color: #b3261e;
    }

    .status.success {
      color: #188038;
    }

    @media (max-width: 760px) {
      .toolbar {
        grid-template-columns: 1fr;
      }

      .wrap {
        padding: 14px;
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="panel">
      <h1>Quản lý comment</h1>
      <p class="muted">Dùng ADMIN_TOKEN trong file .env để xem và xoá comment.</p>

      <div class="toolbar">
        <input id="adminToken" type="password" placeholder="Nhập ADMIN_TOKEN" />
        <input id="bookIdFilter" type="number" placeholder="Book ID" />
        <button id="saveTokenBtn" class="btn-light" type="button">Lưu token</button>
        <button id="loadBtn" class="btn" type="button">Tải comment</button>
      </div>

      <p id="status" class="status"></p>
    </section>

    <section class="panel">
      <div id="commentList" class="comment-list">
        <div class="muted">Chưa tải comment.</div>
      </div>
    </section>
  </main>

  <script>
    const API_BASE_URL =
      location.hostname === "truyenfullvn.org" || location.hostname === "www.truyenfullvn.org"
        ? "https://api.truyenfullvn.org"
        : "http://127.0.0.1:8000";

    const tokenInput = document.getElementById("adminToken");
    const bookIdFilter = document.getElementById("bookIdFilter");
    const saveTokenBtn = document.getElementById("saveTokenBtn");
    const loadBtn = document.getElementById("loadBtn");
    const statusEl = document.getElementById("status");
    const commentList = document.getElementById("commentList");

    tokenInput.value = localStorage.getItem("truyenfullvnAdminToken") || "";

    function setStatus(message, type = "") {
      statusEl.textContent = message || "";
      statusEl.className = "status";
      if (type) statusEl.classList.add(type);
    }

    function getAdminToken() {
      return tokenInput.value.trim();
    }

    function escapeHtml(text) {
      return String(text ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function formatTime(value) {
      if (!value) return "";
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return "";
      return date.toLocaleString("vi-VN");
    }

    async function loadComments() {
      const token = getAdminToken();

      if (!token) {
        setStatus("Bạn cần nhập ADMIN_TOKEN.", "error");
        return;
      }

      setStatus("Đang tải comment...");

      const bookId = bookIdFilter.value.trim();
      const query = bookId ? `?book_id=${encodeURIComponent(bookId)}&limit=100` : "?limit=100";

      try {
        const res = await fetch(`${API_BASE_URL}/api/admin/comments${query}`, {
          headers: {
            "X-Admin-Token": token
          },
          cache: "no-store"
        });

        const data = await res.json().catch(() => ({}));

        if (!res.ok) {
          throw new Error(data.detail || `HTTP ${res.status}`);
        }

        renderComments(data.items || []);
        setStatus(`Đã tải ${data.items?.length || 0}/${data.total || 0} comment.`, "success");
      } catch (err) {
        setStatus(`Lỗi: ${err.message}`, "error");
      }
    }

    function renderComments(items) {
      if (!items.length) {
        commentList.innerHTML = '<div class="muted">Không có comment nào.</div>';
        return;
      }

      commentList.innerHTML = items.map((item) => `
        <article class="comment-item">
          <div class="comment-head">
            <div>
              <div class="comment-book">${escapeHtml(item.book_title)} <span class="muted">#${item.book_id}</span></div>
              <div class="comment-meta">
                Comment #${item.id} • ${escapeHtml(item.user_email)} • ${formatTime(item.created_at)}
              </div>
            </div>
            <div class="comment-meta">♡ ${Number(item.likes || 0)}</div>
          </div>

          <div class="comment-content">${escapeHtml(item.content)}</div>

          <div class="comment-actions">
            <button class="btn-danger" type="button" data-delete="${item.id}">Xoá comment</button>
          </div>
        </article>
      `).join("");
    }

    async function deleteComment(commentId) {
      const token = getAdminToken();

      if (!token) {
        setStatus("Bạn cần nhập ADMIN_TOKEN.", "error");
        return;
      }

      if (!confirm(`Xoá comment #${commentId}?`)) return;

      try {
        const res = await fetch(`${API_BASE_URL}/api/admin/comments/${commentId}`, {
          method: "DELETE",
          headers: {
            "X-Admin-Token": token
          }
        });

        const data = await res.json().catch(() => ({}));

        if (!res.ok) {
          throw new Error(data.detail || `HTTP ${res.status}`);
        }

        setStatus(`Đã xoá comment #${commentId}.`, "success");
        await loadComments();
      } catch (err) {
        setStatus(`Lỗi: ${err.message}`, "error");
      }
    }

    saveTokenBtn.addEventListener("click", () => {
      localStorage.setItem("truyenfullvnAdminToken", getAdminToken());
      setStatus("Đã lưu ADMIN_TOKEN trên máy này.", "success");
    });

    loadBtn.addEventListener("click", loadComments);

    commentList.addEventListener("click", (e) => {
      const btn = e.target.closest("[data-delete]");
      if (!btn) return;
      deleteComment(btn.dataset.delete);
    });
  </script>
</body>
</html>
