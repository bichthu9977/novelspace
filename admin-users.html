<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TruyenFullvn Admin - Quản lý user</title>
  <style>
    :root{--bg:#f5f1ea;--card:#fff;--surface:#faf6f1;--primary:#8a3d2f;--primary-dark:#6d2d22;--text:#2d2d2d;--muted:#777;--border:#e7ddd2;--danger:#b3261e;--success:#188038}
    *{box-sizing:border-box}body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text)}.wrap{max-width:1180px;margin:0 auto;padding:24px}.panel{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:20px;margin-bottom:18px;box-shadow:0 10px 28px rgba(0,0,0,.06)}h1,h2{color:var(--primary-dark);margin:0 0 10px}.muted{color:var(--muted)}.toolbar{display:grid;grid-template-columns:1fr 1fr auto auto;gap:10px;align-items:center}input,button{font:inherit}input{width:100%;border:1px solid var(--border);border-radius:12px;padding:12px 14px;background:var(--surface);outline:none}button{border:0;border-radius:999px;padding:12px 16px;font-weight:700;cursor:pointer}.btn{background:var(--primary);color:#fff}.btn-light{background:#fff5ee;color:var(--primary-dark);border:1px solid #f0d7c5}.btn-danger{background:var(--danger);color:#fff}.status{min-height:22px;color:var(--muted)}.status.error{color:var(--danger)}.status.success{color:var(--success)}.user-list{display:grid;gap:12px}.user-item{border:1px solid var(--border);background:var(--surface);border-radius:16px;padding:14px;display:grid;gap:12px}.user-head{display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap}.user-email{color:var(--primary-dark);font-weight:900;word-break:break-word}.stats{display:flex;gap:8px;flex-wrap:wrap}.stat{background:#fff;border:1px solid var(--border);color:var(--primary-dark);border-radius:999px;padding:5px 10px;font-size:13px;font-weight:700}.actions{display:flex;justify-content:flex-end;gap:8px;flex-wrap:wrap}.detail{display:none;border-top:1px solid var(--border);padding-top:12px}.detail.active{display:grid;gap:14px}.detail-section{background:#fff;border:1px solid var(--border);border-radius:14px;padding:12px}.detail-list{display:grid;gap:8px}.detail-row{border:1px solid var(--border);background:var(--surface);border-radius:12px;padding:10px;line-height:1.5}.small{font-size:13px;color:var(--muted)}@media(max-width:760px){.toolbar{grid-template-columns:1fr}.wrap{padding:14px}}
  </style>
</head>
<body>
  <main class="wrap">
    <section class="panel"><h1>Quản lý user</h1><p class="muted">Xem user, comment, bookmark, tiến độ đọc và xoá user test/spam.</p><div class="toolbar"><input id="adminToken" type="password" placeholder="Nhập ADMIN_TOKEN" /><input id="searchInput" type="text" placeholder="Tìm email user..." /><button id="saveTokenBtn" class="btn-light" type="button">Lưu token</button><button id="loadBtn" class="btn" type="button">Tải user</button></div><p id="status" class="status"></p></section>
    <section class="panel"><div id="userList" class="user-list"><div class="muted">Chưa tải user.</div></div></section>
  </main>
  <script>
    const API_BASE_URL=(location.hostname==="truyenfullvn.org"||location.hostname==="www.truyenfullvn.org")?"https://api.truyenfullvn.org":"http://127.0.0.1:8000";
    const tokenInput=document.getElementById("adminToken"),searchInput=document.getElementById("searchInput"),saveTokenBtn=document.getElementById("saveTokenBtn"),loadBtn=document.getElementById("loadBtn"),statusEl=document.getElementById("status"),userList=document.getElementById("userList");
    tokenInput.value=localStorage.getItem("truyenfullvnAdminToken")||"";
    function setStatus(m,t=""){statusEl.textContent=m||"";statusEl.className="status";if(t)statusEl.classList.add(t)}
    function getAdminToken(){return tokenInput.value.trim()}
    function escapeHtml(t){return String(t??"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;")}
    function formatTime(v){if(!v)return"";const d=new Date(v);return Number.isNaN(d.getTime())?"":d.toLocaleString("vi-VN")}
    async function apiFetch(path,options={}){const token=getAdminToken();if(!token)throw new Error("Bạn cần nhập ADMIN_TOKEN.");const res=await fetch(`${API_BASE_URL}${path}`,{...options,headers:{...(options.headers||{}),"X-Admin-Token":token},cache:"no-store"});const data=await res.json().catch(()=>({}));if(!res.ok)throw new Error(data.detail||`HTTP ${res.status}`);return data}
    async function loadUsers(){setStatus("Đang tải user...");const q=searchInput.value.trim();const query=q?`?q=${encodeURIComponent(q)}&limit=100`:"?limit=100";try{const data=await apiFetch(`/api/admin/users${query}`);renderUsers(data.items||[]);setStatus(`Đã tải ${data.items?.length||0}/${data.total||0} user.`,"success")}catch(err){setStatus(`Lỗi: ${err.message}`,"error")}}
    function renderUsers(items){if(!items.length){userList.innerHTML='<div class="muted">Không có user nào.</div>';return}userList.innerHTML=items.map(user=>`<article class="user-item"><div class="user-head"><div><div class="user-email">${escapeHtml(user.email)}</div><div class="small">User #${user.id} • ${formatTime(user.created_at)}</div></div><div class="stats"><span class="stat">${Number(user.comment_count||0)} comment</span><span class="stat">${Number(user.bookmark_count||0)} bookmark</span><span class="stat">${Number(user.progress_count||0)} progress</span></div></div><div class="actions"><button class="btn-light" type="button" data-detail="${user.id}">Chi tiết</button><button class="btn-danger" type="button" data-delete="${user.id}">Xoá user</button></div><div class="detail" id="detail-${user.id}"><div class="muted">Chưa tải chi tiết.</div></div></article>`).join("")}
    async function loadUserDetail(userId){const detail=document.getElementById(`detail-${userId}`);if(!detail)return;if(detail.classList.contains("active")){detail.classList.remove("active");return}detail.classList.add("active");detail.innerHTML='<div class="muted">Đang tải chi tiết...</div>';try{const data=await apiFetch(`/api/admin/users/${userId}`);detail.innerHTML=renderUserDetail(data)}catch(err){detail.innerHTML=`<div class="status error">Lỗi: ${escapeHtml(err.message)}</div>`}}
    function rows(items,type){if(!items.length)return'<div class="muted">Không có dữ liệu.</div>';return items.map(item=>`<div class="detail-row"><strong>${escapeHtml(item.book_title||"")}</strong><div>${type==="comments"?escapeHtml(item.content||""):""}</div><div class="small">#${item.id} • Book #${item.book_id} ${item.chapter_number?`• Chương ${item.chapter_number}`:""} • ${formatTime(item.created_at||item.updated_at)}</div></div>`).join("")}
    function renderUserDetail(data){return`<section class="detail-section"><h2>Comment gần đây</h2><div class="detail-list">${rows(data.comments||[],"comments")}</div></section><section class="detail-section"><h2>Bookmark</h2><div class="detail-list">${rows(data.bookmarks||[],"bookmarks")}</div></section><section class="detail-section"><h2>Tiến độ đọc</h2><div class="detail-list">${rows(data.progress||[],"progress")}</div></section>`}
    async function deleteUser(userId){if(!confirm(`Xoá user #${userId}? Comment, bookmark và progress của user này cũng sẽ bị xoá.`))return;try{await apiFetch(`/api/admin/users/${userId}?delete_content=true`,{method:"DELETE"});setStatus(`Đã xoá user #${userId}.`,"success");await loadUsers()}catch(err){setStatus(`Lỗi: ${err.message}`,"error")}}
    saveTokenBtn.addEventListener("click",()=>{localStorage.setItem("truyenfullvnAdminToken",getAdminToken());setStatus("Đã lưu ADMIN_TOKEN trên máy này.","success")});
    loadBtn.addEventListener("click",loadUsers);searchInput.addEventListener("keydown",e=>{if(e.key==="Enter")loadUsers()});
    userList.addEventListener("click",e=>{const detailBtn=e.target.closest("[data-detail]");if(detailBtn){loadUserDetail(detailBtn.dataset.detail);return}const deleteBtn=e.target.closest("[data-delete]");if(deleteBtn)deleteUser(deleteBtn.dataset.delete)});
  </script>
</body>
</html>
